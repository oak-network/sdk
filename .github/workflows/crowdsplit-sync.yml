name: Crowdsplit Staging Sync

on:
  repository_dispatch:
    types: [crowdsplit-staging-pushed]

permissions:
  issues: write

concurrency:
  group: crowdsplit-sync
  cancel-in-progress: false

jobs:
  create-sync-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Analyze changes and create issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const payload = context.payload.client_payload ?? {};
            const changedFiles = Array.isArray(payload.changed_files)
              ? payload.changed_files.filter(f => typeof f === 'string' && !f.includes('`'))
              : [];
            const truncated = Boolean(payload.truncated);
            const fileCount = Number(payload.file_count) || changedFiles.length;
            const sha = typeof payload.sha === 'string' ? payload.sha : '';
            const compareUrl = typeof payload.compare_url === 'string' ? payload.compare_url : '';
            const escapeMd = (s) => String(s).replace(/[`*_\[\]\\]/g, '\\$&');
            const commitMessage = escapeMd(payload.commit_message ?? '(no message)').slice(0, 500);

            if (changedFiles.length === 0 && fileCount === 0) {
              console.log('No changed files in payload. Skipping issue creation.');
              return;
            }

            // Deduplicate: if an open api-sync issue was recently updated, append a comment instead
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'api-sync',
              state: 'open',
              sort: 'created',
              direction: 'desc',
              since,
              per_page: 5,
            });

            const fileList = changedFiles.length > 0
              ? changedFiles.map(f => `- \`${f}\``).join('\n')
              : `_File list not available — ${fileCount} file(s) changed (see commit for details)._`;
            const shortSha = sha ? sha.substring(0, 7) : 'unknown';
            const commitLink = compareUrl ? `[\`${shortSha}\`](${compareUrl})` : `\`${shortSha}\``;
            const truncationNote = truncated
              ? `\n\n> **Note:** ${fileCount} files changed in total, showing first ${changedFiles.length}.`
              : '';
            const runLink = `_[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`;

            // Filter out PRs — listForRepo returns both issues and pull requests
            const issuesOnly = existingIssues.data.filter(i => !i.pull_request);

            if (issuesOnly.length > 0) {
              const latestIssue = issuesOnly[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: latestIssue.number,
                body: [
                  `### Additional staging push detected`,
                  ``,
                  `**Commit:** ${commitLink}`,
                  `**Message:** ${commitMessage}`,
                  ``,
                  `### Changed files`,
                  fileList,
                  truncationNote,
                  ``,
                  runLink,
                ].join('\n'),
              });
              console.log(`Appended comment to existing issue #${latestIssue.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[API Sync] Crowdsplit staging updated — ${fileCount} file(s) changed`,
              body: [
                `## Crowdsplit Staging Change Detected`,
                ``,
                `A push to Crowdsplit \`staging\` included changes that may require SDK updates.`,
                ``,
                `**Commit:** ${commitLink}`,
                `**Message:** ${commitMessage}`,
                ``,
                `### Changed files`,
                fileList,
                truncationNote,
                ``,
                `### Action required`,
                `1. Review the changed files in Crowdsplit`,
                `2. Determine if SDK types, services, or methods need updating`,
                `3. Follow the patterns in \`CLAUDE.md\` (Result<T,E>, factory functions, withAuth)`,
                ``,
                `---`,
                `${runLink} · _Auto-generated by Crowdsplit Staging Sync workflow_`,
              ].join('\n'),
              labels: ['api-sync', 'crowdsplit'],
            });
