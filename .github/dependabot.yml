version: 2
# Only file PRs for major version bumps to reduce churn.
# Security updates still come through via GitHub's "Dependabot security updates"
# setting (Settings > Code security and analysis), independent of this file.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
